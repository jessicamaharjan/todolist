<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-panel" aria-labelledby="app-title">
        <header class="app-header">
          <div>
            <p class="eyebrow">Full stack task tracker</p>
            <h1 id="app-title">Todo List</h1>
          </div>
          <div class="counter" aria-live="polite">
            <span id="remaining-count">0</span>
            <small>open</small>
          </div>
        </header>

        <form id="todo-form" class="todo-form">
          <input
            id="todo-input"
            type="text"
            name="title"
            placeholder="Add a new task"
            autocomplete="off"
            required
          />
          <button type="submit">Add</button>
        </form>

        <div class="toolbar" aria-label="Todo filters">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="active">Active</button>
          <button class="filter-button" type="button" data-filter="completed">Done</button>
        </div>

        <p id="status-message" class="status-message" role="status"></p>
        <ul id="todo-list" class="todo-list" aria-label="Todos"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
